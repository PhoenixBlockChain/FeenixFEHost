worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'host=$host subdomain=$subdomain';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── Wildcard subdomain routing ──────────────────────────────────
    # Catches <anything>.feenix.network and serves from /var/www/apps/<subdomain>/
    server {
        listen 80;
        server_name ~^(?<subdomain>[a-z0-9-]+)\.feenix\.network$;

        root /var/www/apps/$subdomain;
        index index.html;

        # Serve static files; fall back to index.html for SPA-like routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Serve .env file with correct content type
        location = /.env {
            default_type text/plain;
        }

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # CORS headers for feenixSDK.js and middleware calls
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle missing apps gracefully
        error_page 404 /404.html;
        location = /404.html {
            root /var/www/default;
            internal;
        }
    }

    # ─── Default server for unmatched hosts / direct IP ──────────────
    server {
        listen 80 default_server;
        server_name _;

        root /var/www/default;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
