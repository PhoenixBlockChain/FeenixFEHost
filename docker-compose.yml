services:
  poller:
    build: .
    restart: unless-stopped
    volumes:
      - apps:/var/www/apps
    environment:
      - APPS_DIR=/var/www/apps
      - STATE_FILE=/app/state.json
      - POLL_INTERVAL=60000
      - BLOCKCHAIN_API_URL=http://api.feenix.network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - apps:/var/www/apps:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./default-pages:/var/www/default:ro
    depends_on:
      - poller

volumes:
  apps:
